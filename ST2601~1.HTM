<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stay Luxe — Phone Selector</title>
<style>
  :root{--orange:#E8821E;--ink:#2b2b2b;--muted:#6b6b6b;--line:#e2e2e2;--bar:#efefef;}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter','Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;background:#fff}

  /* top utility bar — same slim height as the live header strip */
  .topbar{background:var(--bar);height:34px;display:flex;align-items:center;justify-content:center;padding:0 22px;font-size:13px;color:var(--ink)}

  /* phone selector */
  .phone{position:relative;font-size:13px}
  .phone-btn{display:flex;align-items:center;gap:8px;background:transparent;border:none;cursor:pointer;padding:5px 8px;border-radius:7px;font:inherit;color:var(--ink);line-height:1}
  .phone-btn:hover{background:rgba(0,0,0,.05)}
  .phone-btn .ico{width:14px;height:14px;color:var(--ink);flex-shrink:0}
  .phone-btn .flag{width:21px;height:14px;object-fit:cover;border-radius:2px;box-shadow:0 0 0 1px rgba(0,0,0,.1);display:block}
  .phone-btn .num{font-weight:600;white-space:nowrap}
  .phone-btn .chev{font-size:9px;color:var(--muted);transition:transform .2s;margin-left:1px}
  .phone.open .phone-btn .chev{transform:rotate(180deg)}

  .menu{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.14);min-width:210px;padding:5px;display:none;z-index:20}
  .phone.open .menu{display:block}
  .opt{display:flex;align-items:center;gap:10px;width:100%;background:transparent;border:none;cursor:pointer;padding:9px 10px;border-radius:7px;font:inherit;color:var(--ink);text-decoration:none}
  .opt:hover{background:#f5f5f5}
  .opt .flag{width:24px;height:16px;object-fit:cover;border-radius:2px;box-shadow:0 0 0 1px rgba(0,0,0,.1);display:block}
  .opt .num{font-weight:600;white-space:nowrap}
  .opt.active{background:#faf1e6}
  .opt.active .num{color:var(--orange)}
</style>
</head>
<body>

<div class="topbar">
  <div class="phone" id="phone">
    <button class="phone-btn" id="phoneBtn" aria-haspopup="true" aria-expanded="false">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      <img class="flag" id="curFlag" src="https://flagcdn.com/w40/nz.png" alt="NZ">
      <span class="num" id="curNum">+64 9 888 6424</span>
      <span class="chev">▼</span>
    </button>
    <div class="menu" id="phoneMenu" role="menu"></div>
  </div>
</div>

<script>
const NUMBERS=[
  {code:"NZ",iso:"nz",num:"+64 9 888 6424",tel:"+6498886424"},
  {code:"AU",iso:"au",num:"+61 2 8083 9555",tel:"+61280839555"},
  {code:"US",iso:"us",num:"+1 (572) 234 3290",tel:"+15722343290"}
];
const flagSrc=iso=>`https://flagcdn.com/w40/${iso}.png`;
let current="NZ";
const phone=document.getElementById("phone");
const btn=document.getElementById("phoneBtn");
const menu=document.getElementById("phoneMenu");

function renderMenu(){
  menu.innerHTML=NUMBERS.map(n=>`
    <a class="opt ${n.code===current?'active':''}" href="tel:${n.tel}" data-code="${n.code}">
      <img class="flag" src="${flagSrc(n.iso)}" alt="${n.code}"><span class="num">${n.num}</span>
    </a>`).join("");
  menu.querySelectorAll(".opt").forEach(a=>a.onclick=()=>{
    current=a.dataset.code;
    const n=NUMBERS.find(x=>x.code===current);
    document.getElementById("curFlag").src=flagSrc(n.iso);
    document.getElementById("curFlag").alt=n.code;
    document.getElementById("curNum").textContent=n.num;
    close();renderMenu();
  });
}
function open(){phone.classList.add("open");btn.setAttribute("aria-expanded","true");}
function close(){phone.classList.remove("open");btn.setAttribute("aria-expanded","false");}
btn.onclick=e=>{e.stopPropagation();phone.classList.contains("open")?close():open();};
document.addEventListener("click",close);
menu.addEventListener("click",e=>e.stopPropagation());
renderMenu();
</script>
</body>
</html>
